[build]
  command = "npm run build"
  # Con preset netlify-legacy, Nitro genera la parte estática en dist (no .output/public)
  publish = "dist"
  # npm install (no ci) para que optionalDependencies se instalen en Linux
  install_command = "npm install"

[build.environment]
  # Node 22: recomendado por Netlify; evita aviso y mejora compatibilidad
  NODE_VERSION = "22"
